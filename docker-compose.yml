version: "3.8"

services:
  # ──────── PostgreSQL ────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudroid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudroid
      POSTGRES_PASSWORD: cloudroid_secret
      POSTGRES_DB: cloudroid_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cloudroid -d cloudroid_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────── Redis ────────
  redis:
    image: redis:7-alpine
    container_name: cloudroid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────── Backend API ────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudroid-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cloudroid:cloudroid_secret@postgres:5432/cloudroid_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-this-to-a-very-long-random-secret-in-production
      APK_UPLOAD_DIR: /app/uploads/apks
    volumes:
      - apk_uploads:/app/uploads/apks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────── Frontend ────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudroid-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  apk_uploads:
